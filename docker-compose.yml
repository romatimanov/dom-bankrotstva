version: '3.8'

services:
  db:
    image: mysql:5.7
    platform: linux/x86_64
    container_name: mysite-mysql
    restart: always
    environment:
      MYSQL_DATABASE: my_site
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mysite-phpmyadmin
    restart: always
    ports:
      - '8080:80'
    environment:
      PMA_HOST: db
      PMA_PORT: 3306

volumes:
  db_data:
